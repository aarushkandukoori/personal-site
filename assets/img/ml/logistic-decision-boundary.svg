  <circle cx="510" cy="130" r="9" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
  <circle cx="550" cy="100" r="9" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
  <circle cx="590" cy="70" r="9" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
